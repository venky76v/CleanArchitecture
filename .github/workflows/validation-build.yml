name: Validation Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  security-events: write

jobs:
  detect-claude-eligibility:
    name: Detect Claude eligibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should-review: ${{ steps.changed-files.outputs.should-review }}
    steps:
      - name: Check changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            // Claude's GitHub App validates the invoking workflow against main.
            // Skip automated review when this workflow file itself changes.
            const touchesValidationWorkflow = files.some(file => file.filename === '.github/workflows/validation-build.yml');
            core.setOutput('should-review', touchesValidationWorkflow ? 'false' : 'true');

  build-test-codeql:
    name: Build, Test & CodeQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 🔍 CodeQL init
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Restore
        run: dotnet restore

      # CodeQL requires build step
      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      # 🔍 CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  claude-pr-review:
    name: Claude PR Review
    runs-on: ubuntu-latest
    needs:
      - detect-claude-eligibility
      - build-test-codeql
    if: github.event_name == 'pull_request' && needs.detect-claude-eligibility.outputs.should-review == 'true'

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load PR review prompt
        id: prompt
        shell: bash
        run: |
          {
            echo 'PROMPT<<EOF'
            cat .github/prompts/review_pr.prompt.md
            echo
            echo "Repository: ${{ github.repository }}"
            echo "Pull Request: #${{ github.event.pull_request.number }}"
            echo "Base branch: ${{ github.base_ref }}"
            echo "Head branch: ${{ github.head_ref }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: |
            --max-turns 8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
